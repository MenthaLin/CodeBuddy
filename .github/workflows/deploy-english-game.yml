name: Deploy English Fun Zone to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '英语学习/client/**'
      - '.github/workflows/deploy-english-game.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 英语学习/client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup env (optional Supabase)
        run: |
          echo VITE_SUPABASE_URL=$SUPA_URL >> .env
          echo VITE_SUPABASE_ANON_KEY=$SUPA_KEY >> .env
        env:
          SUPA_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 英语学习/client/dist
          publish_branch: gh-pages
          enable_jekyll: false
          commit_message: 'deploy: English Fun Zone [ci skip]'
